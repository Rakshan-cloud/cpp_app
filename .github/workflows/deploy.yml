name: CI/CD Pipeline - Secure QR-Based Event Ticketing Platform

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  AWS_REGION: ap-southeast-2
  S3_FRONTEND_BUCKET: rakshan-frontend
  EB_APP_NAME: rakshan
  EB_ENV_NAME: rakshan-prod

jobs:
  # Stage 1: Test the qr_ticket_manager custom library
  test-library:
    name: Test qr_ticket_manager Library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qr_ticket_manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install library in development mode
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run library tests
        run: pytest tests/ -v --tb=short

  # Stage 2: Deploy Flask backend to Elastic Beanstalk
  deploy-backend:
    name: Deploy Backend to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test-library
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -e ../qr_ticket_manager

      - name: Package backend for Elastic Beanstalk
        run: |
          # Copy library into backend so it deploys together
          cp -r qr_ticket_manager/qr_ticket_manager backend/qr_ticket_manager
          cd backend
          zip -r ../backend-deploy.zip . -x "*.pyc" "*__pycache__/*" "tests/*" "local_data/*" ".gitignore"

      - name: Deploy to Elastic Beanstalk
        run: |
          # Upload to the EB app's S3 bucket
          EB_BUCKET=$(aws elasticbeanstalk create-storage-location --query S3Bucket --output text)
          DEPLOY_KEY="backend-deploy-${{ github.sha }}.zip"
          aws s3 cp backend-deploy.zip "s3://${EB_BUCKET}/${DEPLOY_KEY}"
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APP_NAME }} \
            --version-label "v-${{ github.sha }}" \
            --source-bundle S3Bucket=${EB_BUCKET},S3Key=${DEPLOY_KEY} \
            --region ${{ env.AWS_REGION }}
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-name ${{ env.EB_ENV_NAME }} \
            --version-label "v-${{ github.sha }}" \
            --region ${{ env.AWS_REGION }}
          echo "Backend deployment initiated"

  # Stage 3: Build and deploy React frontend to S3
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build production bundle
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: http://rakshan-prod.eba-7mxtcx4w.ap-southeast-2.elasticbeanstalk.com/api

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_FRONTEND_BUCKET }} --delete

      - name: Print Frontend URL
        run: |
          echo "Frontend deployed to: http://${{ env.S3_FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
