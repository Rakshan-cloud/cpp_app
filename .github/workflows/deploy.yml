name: CI/CD Pipeline - Secure QR-Based Event Ticketing Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Stage 1: Test the qr_ticket_manager custom library
  test-library:
    name: Test qr_ticket_manager Library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rakshan/qr_ticket_manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install library in development mode
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run library tests
        run: pytest tests/ -v --tb=short

  # Stage 2: Test and deploy the Flask backend
  test-backend:
    name: Test and Deploy Backend
    runs-on: ubuntu-latest
    needs: test-library
    defaults:
      run:
        working-directory: rakshan/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ../qr_ticket_manager

      - name: Run backend tests
        run: pytest tests/ -v --tb=short
        env:
          FLASK_ENV: testing

      - name: Package backend for deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Backend packaged for deployment"
          # In production: deploy to AWS Elastic Beanstalk or EC2
          # eb deploy or aws ecs update-service

  # Stage 3: Build and deploy the React frontend
  build-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: test-backend
    defaults:
      run:
        working-directory: rakshan/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rakshan/frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.API_URL }}
          CI: false

      - name: Deploy to S3/CloudFront
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Frontend built and ready for deployment"
          # In production: aws s3 sync build/ s3://rakshan-frontend
          # aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
