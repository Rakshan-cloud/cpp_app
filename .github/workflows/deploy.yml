name: CI/CD Pipeline - Secure QR-Based Event Ticketing Platform

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'
  AWS_REGION: eu-west-1
  S3_FRONTEND_BUCKET: rakshan-frontend-prod
  EB_APP_NAME: rakshan-app
  EB_ENV_NAME: rakshan-prod

jobs:
  # Stage 1: Test the qr_ticket_manager custom library
  test-library:
    name: Test qr_ticket_manager Library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qr_ticket_manager

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install library in development mode
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run library tests
        run: pytest tests/ -v --tb=short

  # Stage 2: Deploy Flask backend to Elastic Beanstalk
  deploy-backend:
    name: Deploy Backend to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test-library
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      backend_url: ${{ steps.get-url.outputs.backend_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package backend with library
        run: |
          cp -r qr_ticket_manager/qr_ticket_manager backend/qr_ticket_manager
          cp -r lambda_functions backend/lambda_functions
          cd backend
          zip -r ../deploy-package.zip . \
            -x "*.pyc" \
            -x "*__pycache__/*" \
            -x "tests/*" \
            -x "local_data/*" \
            -x ".gitignore" \
            -x "*.egg-info/*"
          cd ..
          echo "Package size: $(du -h deploy-package.zip | cut -f1)"

      - name: Create EB Application if not exists
        run: |
          aws elasticbeanstalk describe-applications --application-names ${{ env.EB_APP_NAME }} --query "Applications[0].ApplicationName" --output text 2>/dev/null | grep -q "${{ env.EB_APP_NAME }}" || \
          aws elasticbeanstalk create-application --application-name ${{ env.EB_APP_NAME }} --description "Rakshan QR Ticketing Backend"

      - name: Upload to S3 and create application version
        run: |
          EB_BUCKET=$(aws elasticbeanstalk create-storage-location --query S3Bucket --output text)
          VERSION="v-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::8}"
          aws s3 cp deploy-package.zip "s3://${EB_BUCKET}/${EB_APP_NAME}/${VERSION}.zip"
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APP_NAME }} \
            --version-label "${VERSION}" \
            --source-bundle S3Bucket=${EB_BUCKET},S3Key=${{ env.EB_APP_NAME }}/${VERSION}.zip
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "EB_BUCKET=${EB_BUCKET}" >> $GITHUB_ENV

      - name: Create or update EB Environment
        run: |
          ENV_EXISTS=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-names ${{ env.EB_ENV_NAME }} \
            --query "Environments[?Status!='Terminated'].EnvironmentName" \
            --output text 2>/dev/null || echo "")

          if [ -z "$ENV_EXISTS" ]; then
            echo "Finding available Python solution stack..."
            SOLUTION_STACK=$(aws elasticbeanstalk list-available-solution-stacks \
              --query "SolutionStacks[?contains(@, 'Python 3.11')] | [0]" \
              --output text)
            echo "Using solution stack: $SOLUTION_STACK"

            echo "Creating new environment..."
            aws elasticbeanstalk create-environment \
              --application-name ${{ env.EB_APP_NAME }} \
              --environment-name ${{ env.EB_ENV_NAME }} \
              --version-label "${VERSION}" \
              --solution-stack-name "$SOLUTION_STACK" \
              --option-settings \
                Namespace=aws:elasticbeanstalk:application:environment,OptionName=FLASK_ENV,Value=production \
                Namespace=aws:elasticbeanstalk:application:environment,OptionName=TICKET_SECRET_KEY,Value=ticket-hmac-secret-key-2026 \
                Namespace=aws:elasticbeanstalk:application:environment,OptionName=S3_BUCKET,Value=rakshan-qr-tickets \
                Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_REGION,Value=${{ env.AWS_REGION }} \
                Namespace=aws:elasticbeanstalk:container:python,OptionName=WSGIPath,Value=application:application \
                Namespace=aws:autoscaling:launchconfiguration,OptionName=InstanceType,Value=t3.micro \
                Namespace=aws:autoscaling:launchconfiguration,OptionName=IamInstanceProfile,Value=aws-elasticbeanstalk-ec2-role
            echo "Waiting for environment to be ready..."
            aws elasticbeanstalk wait environment-exists --environment-names ${{ env.EB_ENV_NAME }}
            sleep 60
          else
            echo "Updating existing environment..."
            aws elasticbeanstalk update-environment \
              --application-name ${{ env.EB_APP_NAME }} \
              --environment-name ${{ env.EB_ENV_NAME }} \
              --version-label "${VERSION}"
          fi

      - name: Wait for deployment
        run: |
          echo "Waiting for environment to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name ${{ env.EB_APP_NAME }} \
              --environment-names ${{ env.EB_ENV_NAME }} \
              --query "Environments[0].Status" --output text 2>/dev/null || echo "Unknown")
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --application-name ${{ env.EB_APP_NAME }} \
              --environment-names ${{ env.EB_ENV_NAME }} \
              --query "Environments[0].Health" --output text 2>/dev/null || echo "Unknown")
            echo "Attempt $i: Status=$STATUS, Health=$HEALTH"
            if [ "$STATUS" = "Ready" ]; then
              echo "Environment is ready!"
              break
            fi
            sleep 10
          done

      - name: Get Backend URL
        id: get-url
        run: |
          CNAME=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-names ${{ env.EB_ENV_NAME }} \
            --query "Environments[0].CNAME" --output text 2>/dev/null || echo "")
          echo "Backend URL: http://${CNAME}"
          echo "backend_url=http://${CNAME}/api" >> $GITHUB_OUTPUT

  # Stage 3: Build and deploy React frontend to S3
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket if not exists
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_FRONTEND_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.S3_FRONTEND_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

          aws s3api put-public-access-block --bucket ${{ env.S3_FRONTEND_BUCKET }} \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"

          aws s3api put-bucket-policy --bucket ${{ env.S3_FRONTEND_BUCKET }} --policy '{
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "PublicReadGetObject",
              "Effect": "Allow",
              "Principal": "*",
              "Action": "s3:GetObject",
              "Resource": "arn:aws:s3:::${{ env.S3_FRONTEND_BUCKET }}/*"
            }]
          }'

          aws s3 website s3://${{ env.S3_FRONTEND_BUCKET }} --index-document index.html --error-document index.html

      - name: Install dependencies
        run: |
          cd frontend
          rm -rf node_modules package-lock.json
          npm install

      - name: Build production bundle
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.backend_url }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_FRONTEND_BUCKET }} --delete

      - name: Print Deployed URLs
        run: |
          echo "Frontend: http://${{ env.S3_FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
          echo "Backend:  ${{ needs.deploy-backend.outputs.backend_url }}"
